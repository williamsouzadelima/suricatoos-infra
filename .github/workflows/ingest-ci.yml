name: ingest-ci

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "ingest/**"
      - "correlation/**"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/ingest-ci.yml"
  pull_request:
    paths:
      - "ingest/**"
      - "correlation/**"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/ingest-ci.yml"

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (ingest + pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            ingest/go.mod
            correlation/go.mod
      - name: gofmt (ingest)
        run: |
          unformatted="$(gofmt -l ingest/)"
          if [ -n "$unformatted" ]; then echo "$unformatted"; exit 1; fi
      - name: go vet (ingest)
        run: go vet ./ingest/...
      - name: build (ingest)
        run: go build ./ingest/...
      - name: test (ingest, race)
        run: go test -race ./ingest/...
