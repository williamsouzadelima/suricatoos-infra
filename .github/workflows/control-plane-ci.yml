name: control-plane-ci

on:
  push:
    branches: [main, "feat/**"]
    paths: ["control-plane/**", ".github/workflows/control-plane-ci.yml"]
  pull_request:
    paths: ["control-plane/**", ".github/workflows/control-plane-ci.yml"]

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (control-plane)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: control-plane/go.mod
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (race)
        run: go test -race ./...
