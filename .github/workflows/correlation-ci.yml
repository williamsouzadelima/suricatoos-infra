name: correlation-ci

on:
  push:
    branches: [main, "feat/**"]
    paths: ["correlation/**", "schema/**", ".github/workflows/correlation-ci.yml"]
  pull_request:
    paths: ["correlation/**", "schema/**", ".github/workflows/correlation-ci.yml"]

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: correlation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: correlation/go.mod
      - name: gofmt
        if: runner.os != 'Windows'
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (race)
        if: runner.os != 'Windows'
        run: go test -race ./...
      - name: test
        if: runner.os == 'Windows'
        run: go test ./...
