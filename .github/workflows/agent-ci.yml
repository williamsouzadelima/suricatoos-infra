name: agent-ci

on:
  push:
    branches: [main, "feat/**"]
    paths: ["agent/**", "schema/**", ".github/workflows/agent-ci.yml"]
  pull_request:
    paths: ["agent/**", "schema/**", ".github/workflows/agent-ci.yml"]

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: agent/go.mod
      - name: gofmt
        if: runner.os != 'Windows'
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (race)
        if: runner.os != 'Windows'
        run: go test -race ./...
      - name: test
        if: runner.os == 'Windows'
        run: go test ./...

  schema-validate:
    name: validate JSON schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: schemas are valid JSON Schema (Draft 2020-12)
        run: |
          python3 -m pip install --quiet jsonschema
          python3 - <<'PY'
          import json, glob, sys
          from jsonschema import Draft202012Validator
          ok = True
          for f in sorted(glob.glob("schema/*.json")):
              try:
                  Draft202012Validator.check_schema(json.load(open(f)))
                  print("ok", f)
              except Exception as e:
                  ok = False
                  print("FAIL", f, e)
          sys.exit(0 if ok else 1)
          PY
