name: agent-package

# Builds the Linux .deb/.rpm packages of the Suricatoos Agent (amd64 + arm64).
# Manual (workflow_dispatch), PR (validação), ou tag agent-v* (publica Release).
# Assina com GPG quando o segredo PKG_SIGNING_KEY existe (senão, unsigned).
# .pkg macOS / MSI Windows: pendentes (creds Apple/Windows — ver packaging/README.md).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "package version (e.g. 0.1.0)"
        default: "0.1.0"
  push:
    tags: ["agent-v*"]
  pull_request:
    paths: ["agent/**", "packaging/**", ".github/workflows/agent-package.yml"]

permissions:
  contents: write   # criar GitHub Release nos tags agent-v*

jobs:
  package:
    name: build .deb/.rpm (amd64+arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: agent/go.mod
      - name: install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm
          nfpm --version
      - name: derive version
        id: ver
        run: |
          v="${{ github.event.inputs.version }}"
          # an agent-vX.Y.Z tag wins over the manual input default
          case "${GITHUB_REF}" in refs/tags/agent-v*) v="${GITHUB_REF#refs/tags/agent-v}";; esac
          echo "version=${v:-0.1.0}" >> "$GITHUB_OUTPUT"
      - name: build packages
        env:
          PKG_SIGNING_KEY: ${{ secrets.PKG_SIGNING_KEY }}
        run: |
          if [ -n "$PKG_SIGNING_KEY" ]; then
            umask 077
            printf '%s' "$PKG_SIGNING_KEY" > /tmp/pkg-signing.asc
            export SIGN_KEY_FILE=/tmp/pkg-signing.asc
            echo "::notice::pacotes serão ASSINADOS (chave Suricatoos Agent Packages)"
          else
            echo "::warning::PKG_SIGNING_KEY ausente — pacotes UNSIGNED (defina o segredo p/ assinar; PRs de fork não têm acesso a segredos)"
          fi
          bash packaging/linux/build.sh "${{ steps.ver.outputs.version }}"
          rm -f /tmp/pkg-signing.asc
      - name: checksums
        run: |
          ( cd dist && sha256sum *.deb *.rpm > SHA256SUMS )
          cat dist/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: suricatoos-agent-linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
          if-no-files-found: error

      # Distribuição: nos tags agent-v*, publica um GitHub Release com os pacotes
      # (assinados se PKG_SIGNING_KEY estiver setado), os checksums e a chave pública.
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/agent-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --repo "${{ github.repository }}" \
            --title "Suricatoos Agent ${{ steps.ver.outputs.version }}" \
            --notes "Pacotes do Suricatoos Agent (Linux .deb/.rpm amd64+arm64; macOS .pkg universal). Verifique a assinatura GPG (Linux) com a chave pública (packaging/keys/) — ver packaging/{linux,macos}/README.install.md." \
            dist/*.deb dist/*.rpm dist/SHA256SUMS \
            packaging/keys/suricatoos-agent-pkg-pub.asc

  package-macos:
    name: build .pkg (macOS universal)
    runs-on: macos-latest
    needs: package   # o Release é criado no job 'package'; só então anexamos o .pkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: agent/go.mod
      - name: derive version
        id: ver
        run: |
          v="${{ github.event.inputs.version }}"
          case "${GITHUB_REF}" in refs/tags/agent-v*) v="${GITHUB_REF#refs/tags/agent-v}";; esac
          echo "version=${v:-0.1.0}" >> "$GITHUB_OUTPUT"
      # UNSIGNED — assinatura/notarização (Developer ID + notarytool) precisa de
      # credenciais Apple do operador; ver packaging/macos/README.install.md.
      - name: build .pkg
        run: bash packaging/macos/build.sh "${{ steps.ver.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: suricatoos-agent-macos-pkg
          path: dist/*.pkg
          if-no-files-found: error
      - name: anexa o .pkg ao Release (tags agent-v*)
        if: startsWith(github.ref, 'refs/tags/agent-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" dist/*.pkg --repo "${{ github.repository }}" --clobber
