name: gmp-bridge-ci

on:
  push:
    branches: [main, "feat/**"]
    paths: ["gmp-bridge/**", ".github/workflows/gmp-bridge-ci.yml"]
  pull_request:
    paths: ["gmp-bridge/**", ".github/workflows/gmp-bridge-ci.yml"]

permissions:
  contents: read

jobs:
  test:
    name: test (python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gmp-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: gmp-bridge/requirements.txt
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: pytest
        run: python -m pytest -q
