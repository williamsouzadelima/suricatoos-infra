services:
  gsa:
    image: ghcr.io/williamsouzadelima/suricatoos-gsa:stable
    environment:
      GSA_VENDOR_TITLE: "Suricatoos"
      GSA_VENDOR_VERSION: "Suricatoos 1.0"
  gsad:
    image: ghcr.io/williamsouzadelima/suricatoos-gsad:stable
  nginx:
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/log/suricatoos-nginx:/var/log/nginx-sur
      - /etc/letsencrypt:/etc/letsencrypt:ro

  # Suricatoos: helper que atualiza/agenda os feeds (chamado pelo GSA via /feed-sync/)
  feed-updater:
    build: ./feed-updater
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      COMPOSE_DIR: /compose
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/suricatoos/compose:/compose:ro
      - feed_updater_state:/state

volumes:
  feed_updater_state:
