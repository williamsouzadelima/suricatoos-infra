services:
  gsa:
    image: ghcr.io/williamsouzadelima/suricatoos-gsa:stable
    environment:
      GSA_VENDOR_TITLE: "Suricatoos"
      GSA_VENDOR_VERSION: "Suricatoos 1.0"
  gsad:
    image: ghcr.io/williamsouzadelima/suricatoos-gsad:stable

  # Suricatoos: report-formats feed fork. Adds the "Suricatoos Premium PDF"
  # report format to the Greenbone feed so gvmd installs it as predefined +
  # trusted (aparece automaticamente no dropdown "Download report" da GSA, sem
  # GPG, sem mexer no frontend). Puramente aditivo — os formatos stock seguem.
  # Imagem buildada por .github/workflows/report-formats-publish.yml a partir de
  # report-formats/Dockerfile. Só a imagem é sobrescrita; o resto vem do compose.yaml.
  report-formats:
    image: ghcr.io/williamsouzadelima/suricatoos-report-formats:stable

  nginx:
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/log/suricatoos-nginx:/var/log/nginx-sur
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Enrollment CA — nginx verifies agent client certs (mTLS) for /ingest/.
      # Same CA the control-plane issues with (CA_CERT_FILE in control-plane.env).
      - /var/lib/suricatoos-cp/ca.crt:/etc/nginx/enroll-ca.crt:ro
      # (Downloads/Agentes migraram para páginas nativas da SPA do GSA — não há
      # mais HTML estático montado aqui.)
      # Scripts de instalação one-shot servidos em /install.sh e /install.ps1.
      - ../packaging/install:/usr/share/suricatoos/install:ro

  # Suricatoos: proxy restrito do docker socket (so containers/images/networks/volumes,
  # sem exec/swarm/secrets). O feed-updater fala com o docker SO atraves daqui.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
      VERSION: 1
      PING: 1
      POST: 1
      EXEC: 0
      BUILD: 0
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      SERVICES: 0
      TASKS: 0
      NODES: 0
      SYSTEM: 0
      DISTRIBUTION: 0
      PLUGINS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Suricatoos: helper que atualiza/agenda os feeds (chamado pelo GSA via /feed-sync/)
  feed-updater:
    build: ./feed-updater
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    environment:
      TZ: America/Sao_Paulo
      COMPOSE_DIR: /compose
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    volumes:
      - /root/suricatoos/compose:/compose:ro
      - feed_updater_state:/state
      # Auth GHCR: um dos feeds (report-formats) é a NOSSA imagem PRIVADA no GHCR.
      # O `docker compose up --pull always` roda DENTRO deste container e lê a auth
      # do config.json do docker CLI local — que sem isto está vazio → o pull da
      # report-formats dá "unauthorized" e ABORTA o batch inteiro (os feeds públicos
      # do Greenbone nem chegam a puxar). Montamos o config.json do host (já logado
      # no ghcr.io com o PAT durável) read-only p/ o pull autenticar. Alternativa
      # permanente: tornar o pacote report-formats público (aí este mount é dispensável).
      - /root/.docker/config.json:/root/.docker/config.json:ro

  # Suricatoos: control-plane do agente de endpoint.
  # Enroll: POST  https://scanner.suricatoos.com/agent/v1/enroll
  # CRL:    GET   https://scanner.suricatoos.com/agent/v1/crl.der
  # Admin:  POST/GET/DELETE https://scanner.suricatoos.com/agent/api/v1/tokens  (Bearer ADMIN_SECRET)
  #
  # Pré-requisito no host: criar /var/lib/suricatoos-cp/ e o env file:
  #   mkdir -p /var/lib/suricatoos-cp
  #   cat > /var/lib/suricatoos-cp/control-plane.env <<'EOF'
  #   CONTROL_PLANE_URL=https://scanner.suricatoos.com/agent/v1   # DEVE terminar em /v1:
  #     o agente posta {server}/enroll, e o endpoint público é /agent/v1/enroll
  #     (nginx tira /agent/ → control-plane serve /v1/enroll). Sem o /v1 → 404.
  #   ADMIN_SECRET=<segredo-forte-gerado-com-openssl-rand-hex-32>
  #   CA_CERT_FILE=/data/ca.crt
  #   CA_KEY_FILE=/data/ca.key
  #   TOKEN_DB_PATH=/data/tokens.db
  #   CRL_URL=https://scanner.suricatoos.com/agent/v1/crl.der
  #   CRL_FILE=/data/crl.json
  #   INGEST_URL=https://scanner.suricatoos.com/ingest/v1/inventory
  #   # Auto-update (opcional): publique os binários crus no Release agent-v*, baixe
  #   # o update-manifest.json do Release para /var/lib/suricatoos-cp/ e aponte:
  #   UPDATE_MANIFEST_FILE=/data/update-manifest.json
  #   EOF
  # INGEST_URL é entregue aos agentes no enroll → eles reportam ao ingest sem --ingest.
  #   chmod 600 /var/lib/suricatoos-cp/control-plane.env
  control-plane:
    image: ghcr.io/williamsouzadelima/suricatoos-control-plane:stable
    restart: unless-stopped
    # required:false → o feed-updater roda `docker compose up <feeds>` de DENTRO do
    # seu container (só monta /compose, NÃO /var/lib/suricatoos-cp); o compose parseia
    # TODOS os serviços, então um env_file obrigatório aqui fazia o sync dos feeds falhar
    # ("env file ... not found"). Opcional aqui não enfraquece nada: o control-plane
    # valida o env no startup (mustEnv CONTROL_PLANE_URL/ADMIN_SECRET → fatal se faltar).
    env_file:
      - path: /var/lib/suricatoos-cp/control-plane.env
        required: false
    volumes:
      - /var/lib/suricatoos-cp:/data

  # Suricatoos: data-plane do agente. Recebe inventários (push outbound dos
  # agentes, via nginx /ingest/ com mTLS), correlaciona contra as advisories
  # Notus do feed e importa os achados no gvmd (gmp-bridge) → visíveis na GSA.
  # Sem porta publicada: o nginx termina o mTLS e proxia internamente.
  #
  # Pré-requisito no host: env file com a senha do gvmd:
  #   mkdir -p /var/lib/suricatoos-cp
  #   echo 'GVM_PASSWORD=<senha-admin-do-gvmd>' > /var/lib/suricatoos-cp/ingest.env
  #   chmod 600 /var/lib/suricatoos-cp/ingest.env
  # Confirme o nome real do volume de advisories Notus no host:
  #   docker volume ls | grep notus      # esperado: <projeto>_notus_data_vol
  ingest:
    image: ghcr.io/williamsouzadelima/suricatoos-ingest:stable
    restart: unless-stopped
    # required:false — idem control-plane: deixa o `docker compose up <feeds>` do
    # feed-updater parsear sem exigir este env_file (host-only). O ingest usa
    # GVM_PASSWORD daqui; se faltar, a auth do gmp-bridge falha de forma visível.
    env_file:
      - path: /var/lib/suricatoos-cp/ingest.env
        required: false
    environment:
      INGEST_ADDR: ":9090"
      NOTUS_DIR: /notus
      GMP_SOCKET: /run/gvmd/gvmd.sock
      GMP_USERNAME: admin
      GMP_TASK_NAME: suricatoos-agent
      # persiste o último check-in por agente (online/offline) entre recreates
      AGENT_LASTSEEN_FILE: /data/agent-lastseen.json
      # --- Loop reNgine→OpenVAS (ADR-0006) — nasce DARK ---
      # enabled=false → POST /ingest/v1/scan-request responde 503; allowlist vazia
      # → deny-all mesmo se habilitado. Habilitar é P3 (env + up -d --no-deps ingest).
      # SCAN_GVM_PASSWORD (senha do usuário gvmd 'suricatoos-scan', NÃO admin) vem
      # do env_file ingest.env — nunca gravado aqui.
      SCAN_LAUNCH_ENABLED: "false"
      SCAN_GMP_USERNAME: suricatoos-scan
      SCAN_HOST_ALLOWLIST: "" # vazia = deny-all; adicionar /32 por engagement na P3
      SCAN_MAX_CONCURRENT: "2"
      SCAN_MIN_RESCAN_INTERVAL: 6h
      SCAN_MAX_DURATION: 6h
      SCAN_STATE_FILE: /data/scan-requests.json
      SCAN_FINDINGS_DIR: /data/findings
      SCAN_CRL_URL: http://control-plane:8080/v1/crl.der
      SCAN_REQUIRE_CRL: "true"
    volumes:
      # Volumes do compose base do greenbone (mesmo projeto): referenciados por
      # short-name; já declarados no compose.yaml base, não redeclarar aqui.
      - gvmd_socket_vol:/run/gvmd          # socket do gvmd (import_report)
      - notus_data_vol:/notus:ro           # *.notus do feed (WalkDir recursivo)
      - ingest_state:/data                 # persiste lastSeen (online/offline) entre recreates

volumes:
  feed_updater_state:
  ingest_state:
