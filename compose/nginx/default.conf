upstream gsad {
  server gsad:9392;
}

server {
    listen 9392;
    return 301 https://$host:443$request_uri;
}

server {
  proxy_read_timeout 1h;

  client_max_body_size 1000m;

  listen 443 ssl;

  server_name localhost;

  include /etc/nginx/conf.d/headers.conf;

  ssl_certificate /etc/nginx/certs/server.cert.pem;
  ssl_certificate_key /etc/nginx/certs/server.key;

  location ~ ^/(gmp|system_report|logout|login) {
    # Suricatoos SPA fix: GET /login serve a SPA (index.html); POST continua no gsad (auth)
    if ($request_method = GET) {
        rewrite ^/login$ /index.html last;
    }
    # Handle preflight requests
    if ($request_method = OPTIONS) {
          add_header Access-Control-Allow-Origin "https://localhost:443" always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
          add_header Content-Length 0 always;
          return 204;
    }
    proxy_pass http://gsad;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Frame-Options;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/config\.(js|ts) {
    root /usr/share/nginx/html;
    try_files $uri =404;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
