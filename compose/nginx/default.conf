# Suricatoos: rate-limit p/ brute-force no login (zona em http context).
# 15 req/min por IP, com burst de 10 imediato. Um humano logando nem percebe;
# brute-force fica limitado. Combina com fail2ban (ban duro) se o IP real for visivel.
limit_req_zone $binary_remote_addr zone=login:10m rate=15r/m;

# Suricatoos: rate-limit p/ o feed-updater (polling de status + sync).
limit_req_zone $binary_remote_addr zone=feedsync:10m rate=120r/m;

# Suricatoos: rate-limit p/ o control-plane (agentes + admin).
limit_req_zone $binary_remote_addr zone=agent_v1:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=agent_api:1m rate=5r/m;

# Suricatoos: rate-limit p/ o ingest (push de inventário dos agentes).
limit_req_zone $binary_remote_addr zone=ingest:10m rate=30r/m;

# Suricatoos: rate-limit p/ o scan-request do loop reNgine→OpenVAS (ADR-0006).
# Baixo: cada request pode disparar um scan ativo. 12 req/min, burst 6.
limit_req_zone $binary_remote_addr zone=scanreq:10m rate=12r/m;

# Suricatoos: rate-limit p/ as rotas do sensor interno (ADR-0007) — poll de jobs +
# heartbeat (frequentes) e o import de report (menos frequente, corpo maior).
limit_req_zone $binary_remote_addr zone=sensorjobs:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=sensorreport:10m rate=30r/m;
# Distribuição de feed nuvem→sensor (ADR-0007 P0 E): manifest (pequeno) + blobs
# content-addressed (maiores). Rate-limit + burst p/ evitar a nuvem virar CDN aberta.
limit_req_zone $binary_remote_addr zone=feedblob:10m rate=240r/m;

# Origin permitido p/ /feed-sync/ (anti-CSRF). Vazio = same-origin GET (browser nao manda Origin) = ok.
map $http_origin $feedsync_origin_ok {
  default 0;
  ""      1;
  "~^https://scanner\.suricatoos\.com$" 1;
  "~^https://localhost(:[0-9]+)?$"      1;
}

upstream gsad {
  server gsad:9392;
}

server {
    listen 9392;
    return 301 https://$host:443$request_uri;
}

server {
  proxy_read_timeout 1h;

  client_max_body_size 1000m;

  listen 443 ssl;

  server_name scanner.suricatoos.com;

  include /etc/nginx/conf.d/headers.conf;

  # Cert real Let's Encrypt (dominio scanner.suricatoos.com). O IP nu segue com aviso (cert nao casa o IP).
  ssl_certificate /etc/letsencrypt/live/scanner.suricatoos.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/scanner.suricatoos.com/privkey.pem;

  # Suricatoos: mTLS p/ o ingest. 'optional' pede (mas nao exige) cert do cliente
  # no handshake, entao o browser na GSA segue normal (nao tem cert da CA privada);
  # a location /ingest/ exige SUCCESS. CA = a mesma que o control-plane emite no enroll.
  ssl_client_certificate /etc/nginx/enroll-ca.crt;
  ssl_verify_client optional;

  # Suricatoos SPA fix (v2): /login exato.
  # GET (refresh do browser na URL /login) -> serve o SPA (index.html), evita 404.
  # Qualquer outro metodo (POST do submit do login, OPTIONS) -> gsad (auth).
  location = /login {
    # brute-force: limita tentativas de login por IP
    limit_req zone=login burst=10 nodelay;
    limit_req_status 429;
    # log dedicado do login (fail2ban le este arquivo via volume no host)
    access_log /var/log/nginx-sur/login.log;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Frame-Options;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    if ($request_method != GET) {
        proxy_pass http://gsad;
    }

    root /usr/share/nginx/html;
    try_files /index.html =404;
  }

  # Suricatoos: feed-updater (atualizar/agendar feeds pela UI).
  # Protegido: precisa do cookie de sessao (GSAD_SID) + same-origin (anti-CSRF) + rate-limit.
  location /feed-sync/ {
    limit_req zone=feedsync burst=40 nodelay;
    if ($cookie_GSAD_SID = "") { return 401; }
    if ($feedsync_origin_ok = 0) { return 403; }
    # resolve o feed-updater dinamicamente (DNS do docker) p/ sobreviver a recriacoes do container
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $feed_upstream feed-updater;
    rewrite ^/feed-sync/(.*)$ /$1 break;
    proxy_pass http://$feed_upstream:8008;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;
  }

  location ~ ^/(gmp|system_report|logout) {
    # Handle preflight requests
    if ($request_method = OPTIONS) {
          add_header Access-Control-Allow-Origin "https://localhost:443" always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
          add_header Content-Length 0 always;
          return 204;
    }
    proxy_pass http://gsad;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Frame-Options;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/config\.(js|ts) {
    root /usr/share/nginx/html;
    try_files $uri =404;
  }

  # Suricatoos: as páginas "Agentes de Endpoint" (/endpoint-agents) e "Downloads"
  # (/downloads) agora são NATIVAS da SPA do GSA (não mais HTML estático) — o
  # fallback SPA em `location /` as serve. O nginx mantém só os endpoints de
  # dados/scan abaixo + /agent/provision/ + /install.{sh,ps1}.
  #
  # Dados (postura gvmd + online/offline): sessão GSA + same-origin → ingest.
  # X-Suricatoos-UI=1 marca a origem-UI; o /ingest/ limpa esse header, então um
  # agente mTLS NÃO consegue ler a postura da frota via /ingest/agents.
  location = /agents/data.json {
    limit_req zone=agent_api burst=10 nodelay;
    if ($cookie_GSAD_SID = "") { return 401; }
    if ($feedsync_origin_ok = 0) { return 403; }
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $ingest_upstream ingest;
    rewrite ^/agents/data\.json$ /agents break;
    proxy_pass http://$ingest_upstream:9090;
    proxy_set_header Host $host;
    proxy_set_header X-Suricatoos-UI 1;
    proxy_read_timeout 30s;
  }
  # "Escanear agora": sessão GSA + same-origin → control-plane enfileira scan_now.
  location = /agents/scan {
    limit_req zone=agent_api burst=10 nodelay;
    if ($cookie_GSAD_SID = "") { return 401; }
    if ($feedsync_origin_ok = 0) { return 403; }
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cp_upstream control-plane;
    rewrite ^/agents/scan$ /agents/scan break;
    proxy_pass http://$cp_upstream:8080;
    proxy_set_header Host $host;
    proxy_read_timeout 30s;
  }

  # Suricatoos: scripts de instalação one-shot (o fluxo sem fricção e os comandos
  # curl|sh / irm|iex apontam pra cá). Estáticos, montados do repo.
  location = /install.sh {
    alias /usr/share/suricatoos/install/install.sh;
    default_type text/x-shellscript;
    add_header Cache-Control "no-store";
  }
  location = /install.ps1 {
    alias /usr/share/suricatoos/install/install.ps1;
    default_type text/plain;
    add_header Cache-Control "no-store";
  }

  # Suricatoos: control-plane do agente de endpoint.
  # Resolve dinamicamente (DNS Docker) p/ sobreviver a recriacoes do container.
  location /agent/api/ {
    limit_req zone=agent_api burst=10 nodelay;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cp_upstream control-plane;
    rewrite ^/agent/(.*)$ /$1 break;
    proxy_pass http://$cp_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Suricatoos (ADR-0007 risco #5): esta location NÃO deriva a identidade do cert,
    # então limpa qualquer X-Client-Cert-* que o cliente tente forjar no header.
    proxy_set_header X-Client-Cert-DN "";
    proxy_set_header X-Client-Cert-Verify "";
    proxy_set_header X-Client-Cert-Serial "";
    proxy_read_timeout 30s;
  }

  # Suricatoos: provisionamento sem fricção (gera token + comando de instalação).
  # Mais específica que /agent/ → vence. Protegida pela SESSÃO da GSA (cookie
  # GSAD_SID) + same-origin (anti-CSRF) + rate-limit: só um usuário logado na GSA
  # pode gerar tokens. O token sai efêmero (1h, uso único) do control-plane.
  location /agent/provision/ {
    limit_req zone=agent_api burst=10 nodelay;
    if ($cookie_GSAD_SID = "") { return 401; }
    if ($feedsync_origin_ok = 0) { return 403; }
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cp_upstream control-plane;
    rewrite ^/agent/(.*)$ /$1 break;
    proxy_pass http://$cp_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Suricatoos (ADR-0007 risco #5): limpa X-Client-Cert-* forjável.
    proxy_set_header X-Client-Cert-DN "";
    proxy_set_header X-Client-Cert-Verify "";
    proxy_set_header X-Client-Cert-Serial "";
    proxy_read_timeout 30s;
  }

  # Suricatoos: canal de comando do agente (poll/ack "scan now"). mTLS
  # OBRIGATÓRIO — a identidade do comando vem do CN do cert verificado, repassado
  # ao control-plane via X-Client-Cert-DN (como o /ingest/). Prefixo mais
  # específico que /agent/, então vence o longest-prefix.
  location /agent/v1/commands {
    if ($ssl_client_verify != SUCCESS) { return 403; }
    limit_req zone=agent_v1 burst=20 nodelay;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cp_upstream control-plane;
    rewrite ^/agent/(.*)$ /$1 break;
    proxy_pass http://$cp_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
    proxy_read_timeout 30s;
  }

  # Suricatoos: rotas do SENSOR interno (ADR-0007). mTLS obrigatório + encaminha o
  # SERIAL p/ o control-plane fazer enforcement de CRL fail-closed. Prefixos mais
  # específicos que /agent/ (longest-prefix vence). Só um cert OU=scanner-sensor
  # passa a authz no control-plane.
  location /agent/v1/scan-jobs {
    if ($ssl_client_verify != SUCCESS) { return 403; }
    limit_req zone=sensorjobs burst=20 nodelay;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cp_upstream control-plane;
    rewrite ^/agent/(.*)$ /$1 break;
    proxy_pass http://$cp_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
    proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
    proxy_set_header X-Client-Cert-Serial $ssl_client_serial;
    proxy_read_timeout 60s;
  }

  location /agent/v1/heartbeat {
    if ($ssl_client_verify != SUCCESS) { return 403; }
    limit_req zone=sensorjobs burst=20 nodelay;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cp_upstream control-plane;
    rewrite ^/agent/(.*)$ /$1 break;
    proxy_pass http://$cp_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
    proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
    proxy_set_header X-Client-Cert-Serial $ssl_client_serial;
    proxy_read_timeout 30s;
  }

  # Suricatoos: renovação de cert (ADR-0007). mTLS obrigatório — o cert ATUAL
  # (ainda válido) autentica a rotação; o control-plane deriva CN/O/OU do DN e
  # re-assina com a MESMA identidade (não do body). Serve p/ sensor E agentes.
  location /agent/v1/renew {
    if ($ssl_client_verify != SUCCESS) { return 403; }
    limit_req zone=agent_api burst=10 nodelay;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cp_upstream control-plane;
    rewrite ^/agent/(.*)$ /$1 break;
    proxy_pass http://$cp_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
    proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
    proxy_set_header X-Client-Cert-Serial $ssl_client_serial;
    proxy_read_timeout 30s;
  }

  # Suricatoos: distribuição de feed do SENSOR interno (ADR-0007 P0 E). mTLS +
  # serial p/ CRL fail-closed. Cobre GET /agent/v1/feed/manifest e /feed/blob/{sha256}.
  # Prefixo mais específico que /agent/ (longest-prefix vence). SEM esta location as
  # requisições caem na /agent/ genérica que ZERA os headers de cert → o feed authz
  # (OU=scanner-sensor) sempre 403 e o mirror nunca sincroniza.
  location /agent/v1/feed {
    if ($ssl_client_verify != SUCCESS) { return 403; }
    limit_req zone=feedblob burst=40 nodelay;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cp_upstream control-plane;
    rewrite ^/agent/(.*)$ /$1 break;
    proxy_pass http://$cp_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
    proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
    proxy_set_header X-Client-Cert-Serial $ssl_client_serial;
    proxy_read_timeout 300s;
  }

  location /agent/ {
    limit_req zone=agent_v1 burst=20 nodelay;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cp_upstream control-plane;
    rewrite ^/agent/(.*)$ /$1 break;
    proxy_pass http://$cp_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Suricatoos (ADR-0007 risco #5): a location genérica NÃO deriva identidade do
    # cert — limpa qualquer X-Client-Cert-* forjável para que só as locations mTLS
    # dedicadas (commands/scan-jobs/heartbeat) possam setá-lo do $ssl_client_*.
    proxy_set_header X-Client-Cert-DN "";
    proxy_set_header X-Client-Cert-Verify "";
    proxy_set_header X-Client-Cert-Serial "";
    proxy_read_timeout 30s;
  }

  # Suricatoos: scan-request do loop reNgine→OpenVAS (ADR-0006). Prefixo mais
  # específico que /ingest/ (longest-prefix vence), então captura POST/GET/DELETE
  # de /ingest/v1/scan-request[/{id}]. mTLS obrigatório + repassa o SERIAL do cert
  # p/ o ingest fazer enforcement de revogação (CRL fail-closed).
  location /ingest/v1/scan-request {
    if ($ssl_client_verify != SUCCESS) { return 403; }
    limit_req zone=scanreq burst=6 nodelay;
    client_max_body_size 2m;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $scan_upstream ingest;
    rewrite ^/ingest/(.*)$ /$1 break;
    proxy_pass http://$scan_upstream:9090;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
    proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
    proxy_set_header X-Client-Cert-Serial $ssl_client_serial; # habilita enforcement de CRL
    proxy_set_header X-Suricatoos-UI "";
    proxy_read_timeout 60s;
  }

  # Suricatoos: import de report do SENSOR interno (ADR-0007). mTLS + serial p/ CRL
  # fail-closed. Prefixo mais específico que /ingest/ (longest-prefix vence). O
  # ingest re-atesta severity/CVE do feed e importa na partição do tenant (=cert O).
  location /ingest/v1/sensor-report {
    if ($ssl_client_verify != SUCCESS) { return 403; }
    limit_req zone=sensorreport burst=10 nodelay;
    client_max_body_size 16m;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $sreport_upstream ingest;
    rewrite ^/ingest/(.*)$ /$1 break;
    proxy_pass http://$sreport_upstream:9090;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
    proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
    proxy_set_header X-Client-Cert-Serial $ssl_client_serial;
    proxy_set_header X-Suricatoos-UI "";
    proxy_read_timeout 300s;
  }

  # Suricatoos: ingest do agente (push de inventário). mTLS obrigatório aqui:
  # só agentes enrolados (cert emitido pela CA de enrollment) podem postar.
  location /ingest/ {
    if ($ssl_client_verify != SUCCESS) { return 403; }
    limit_req zone=ingest burst=10 nodelay;
    client_max_body_size 8m;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $ingest_upstream ingest;
    rewrite ^/ingest/(.*)$ /$1 break;
    proxy_pass http://$ingest_upstream:9090;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # repassa a identidade do cert verificado p/ o ingest (hardening futuro: pin CN==agent_id)
    proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
    proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
    # limpa o marcador de origem-UI: só a location /agents/data.json pode setá-lo,
    # então um agente mTLS não alcança GET /agents (a frota) via /ingest/agents.
    proxy_set_header X-Suricatoos-UI "";
    proxy_read_timeout 30s;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
